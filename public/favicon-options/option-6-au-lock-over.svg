  <text x="122" y="176" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic" font-size="156" font-weight="500"
        fill="#E8295C"
        letter-spacing="-4">AU</text>
  <!-- Open padlock overlapping upper-right -->
  <g transform="translate(150,40)">
