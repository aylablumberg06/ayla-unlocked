<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Option 9: Big italic AU on cream, with a thin pink open-shackle arc above forming a "halo" — minimal, elegant. -->
  <rect width="256" height="256" rx="56" fill="#FDF6F0"/>
  <!-- Open shackle as a pink halo above the letters -->
  <path d="M70 86 V 60 a58 58 0 0 1 116 0 V 76"
        fill="none" stroke="#E8295C" stroke-width="10" stroke-linecap="round"/>
  <text x="128" y="206" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic" font-size="148" font-weight="500"
        fill="#E8295C"
        letter-spacing="-4">AU</text>
</svg>
