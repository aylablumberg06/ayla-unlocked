  <!-- Open shackle in cream -->
  <path d="M82 124 V 80 a44 44 0 0 1 88 0 V 96"
        fill="none" stroke="#FDF6F0" stroke-width="18" stroke-linecap="round"/>
  <!-- Padlock body in cream -->
