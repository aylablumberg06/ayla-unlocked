  <text x="128" y="195" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-style="italic" font-size="86" font-weight="500"
        fill="#E8295C"
        letter-spacing="-2">AU</text>
</svg>
